<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="style.css" />
</head>
<body class="feed-view">
  <main class="feed-page" id="feedPage">
    <aside class="feed-sidebar" id="feedSidebar">
      <div class="sidebar-top-row">
        <div class="sidebar-brand" aria-label="Kite brand">● <strong>Kite</strong></div>
        <button id="sidebarCloseBtn" class="sidebar-close-btn" type="button" aria-label="Close toolbar">✕</button>
      </div>

      <nav class="feed-nav" aria-label="Feed views">
        <button id="homeTabBtn" class="sidebar-btn active" type="button" data-i18n="feed.home">Home</button>
        <button id="exploreTabBtn" class="sidebar-btn" type="button" data-i18n="feed.explore">Explore</button>
        <button id="profileTabBtn" class="sidebar-btn" type="button" data-i18n="feed.profile">Profile</button>
        <button id="settingsTabBtn" class="sidebar-btn" type="button" data-i18n="feed.settings">Settings</button>
      </nav>

      <button id="darkModeBtn" class="secondary-btn" type="button">Theme: Light</button>
      <button id="logoutBtn" class="secondary-btn sidebar-logout" type="button" data-i18n="feed.logout">Logout</button>
    </aside>

    <button id="sidebarToggleBtn" class="sidebar-toggle-btn" type="button" aria-label="Toggle toolbar">☰</button>

    <section class="feed-main">
      <div class="feed-main-inner">
        <header class="feed-header">
          <h1 id="feedTitle">Home</h1>
          <p id="feedSubtitle">Recent posts from people you follow and related accounts.</p>
        </header>


        <section class="wind-compose">
          <label for="chatInput" data-i18n="feed.happening">What's happening?</label>
          <textarea id="chatInput" maxlength="280" placeholder="What’s happening?"></textarea>
          <div class="wind-compose-footer">
            <span id="charCounter">0/280</span>
            <button id="sendBtn" class="chat-send-btn" type="button" data-i18n="feed.post">Post</button>
          </div>
          <p id="feedNotice" class="feed-notice hidden"></p>
        </section>

        <section id="chatContainer" class="wind-feed" aria-live="polite"></section>
      </div>
    </section>

    <aside class="right-toolbar" aria-label="Search and tools">
      <h3 data-i18n="feed.search">Search timeline</h3>
      <input id="globalSearchInput" class="right-search" type="text" placeholder="Search @user/email or #hashtag" />
      <p class="right-toolbar-note">Use @name (or @gmail) to find users, and #tag for hashtags.</p>
      <button id="clearSearchBtn" type="button" class="secondary-btn" data-i18n="feed.clear">Clear Search</button>

      <section class="notifications-panel" aria-label="Notifications">
        <h3 data-i18n="feed.notifications">Notifications</h3>
        <p id="notificationEmpty" class="right-toolbar-note">No notifications yet.</p>
        <div id="notificationList" class="notification-list"></div>
      </section>
    </aside>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="blacklisted.js"></script>
  <script src="policy.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>

  <script>
    const routeParams = new URLSearchParams(window.location.search);
    const isProfileRoute = routeParams.get("view") === "profile" || routeParams.has("user");

    if (isProfileRoute) {
      document.body.innerHTML = '<div id="profilePageRoot"></div>';
      const profileScript = document.createElement("script");
      profileScript.src = "profile.js";
      document.body.appendChild(profileScript);
    } else {
    const reportLoadStatus = window.reportLoadStatus || ((name, error) => {
      if (error) {
        console.error(`error "${name}" didnt load ❌`, error);
      } else {
        console.info(`"${name}" succesfully loaded ✔`);
      }
    });

    const chatContainer = document.getElementById("chatContainer");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const charCounter = document.getElementById("charCounter");
    const logoutBtn = document.getElementById("logoutBtn");
    const feedNotice = document.getElementById("feedNotice");
    const homeTabBtn = document.getElementById("homeTabBtn");
    const exploreTabBtn = document.getElementById("exploreTabBtn");
    const profileTabBtn = document.getElementById("profileTabBtn");
    const settingsTabBtn = document.getElementById("settingsTabBtn");
    const feedTitle = document.getElementById("feedTitle");
    const feedSubtitle = document.getElementById("feedSubtitle");
    const feedPage = document.getElementById("feedPage");
    const sidebarCloseBtn = document.getElementById("sidebarCloseBtn");
    const sidebarToggleBtn = document.getElementById("sidebarToggleBtn");
    const globalSearchInput = document.getElementById("globalSearchInput");
    const clearSearchBtn = document.getElementById("clearSearchBtn");
    const darkModeBtn = document.getElementById("darkModeBtn");
    const notificationList = document.getElementById("notificationList");
    const notificationEmpty = document.getElementById("notificationEmpty");

    const MAX_WIND_LENGTH = 280;
    const LIKE_ICON = "images/ui/like.png";
    const LIKED_ICON = "images/ui/liked.png";
    const LIKED_WINDS_KEY_PREFIX = "kite-liked-winds";
    const LIKED_COMMENTS_KEY_PREFIX = "kite-liked-comments";
    let unsubscribeFeed = null;
    const commentUnsubscribers = new Map();
    let activeFeedView = "home";
    let homeAuthors = new Set();
    let directFollowingAuthors = new Set();
    let secondHopAuthors = new Set();
    let currentUser = null;
    const likedWindIds = new Set();
    const likedCommentIds = new Set();
    let hashtagFilter = "";
    let globalSearchTerm = "";
    let darkModeEnabled = true;
    let currentUserProfilePicture = window.avatarProfilePictureForName
      ? window.avatarProfilePictureForName("a")
      : "";
    let unsubscribeNotifications = null;

    function likedWindsStorageKey() {
      return currentUser ? `${LIKED_WINDS_KEY_PREFIX}-${currentUser.uid}` : LIKED_WINDS_KEY_PREFIX;
    }

    function likedCommentsStorageKey() {
      return currentUser ? `${LIKED_COMMENTS_KEY_PREFIX}-${currentUser.uid}` : LIKED_COMMENTS_KEY_PREFIX;
    }

    function saveLikedState() {
      localStorage.setItem(likedWindsStorageKey(), JSON.stringify([...likedWindIds]));
      localStorage.setItem(likedCommentsStorageKey(), JSON.stringify([...likedCommentIds]));
    }

    function loadLikedState() {
      likedWindIds.clear();
      likedCommentIds.clear();

      try {
        const rawWinds = JSON.parse(localStorage.getItem(likedWindsStorageKey()) || "[]");
        const rawComments = JSON.parse(localStorage.getItem(likedCommentsStorageKey()) || "[]");
        if (Array.isArray(rawWinds)) rawWinds.forEach((id) => likedWindIds.add(String(id)));
        if (Array.isArray(rawComments)) rawComments.forEach((id) => likedCommentIds.add(String(id)));
      } catch (error) {
        console.warn("Unable to restore liked state", error);
      }
    }

    reportLoadStatus("Feed controls");

    function showNotice(text) {
      feedNotice.textContent = text;
      feedNotice.classList.remove("hidden");
    }

    function clearNotice() {
      feedNotice.textContent = "";
      feedNotice.classList.add("hidden");
    }

    function normalizeId(value) {
      return String(value || "").trim().toLowerCase();
    }

    function normalizeHashtag(tag) {
      return String(tag || "").trim().toLowerCase().replace(/^#+/, "");
    }

    function avatarFromName(name) {
      if (window.avatarProfilePictureForName) {
        return window.avatarProfilePictureForName(name);
      }
      return "";
    }


    function extractHashtags(text) {
      const matches = String(text || "").match(/#[a-z0-9_]+/gi) || [];
      return [...new Set(matches.map((tag) => normalizeHashtag(tag)).filter(Boolean))];
    }

    function matchesHashtagFilter(wind) {
      if (!hashtagFilter) return true;
      const fromField = Array.isArray(wind.hashtags) ? wind.hashtags : [];
      const tags = fromField.length ? fromField : extractHashtags(wind.text);
      return tags.includes(hashtagFilter);
    }

    function parseSearchTerm(value) {
      const raw = String(value || "").trim().toLowerCase();
      if (!raw) return { type: "none", value: "" };
      if (raw.startsWith("@")) return { type: "user", value: raw.slice(1) };
      if (raw.startsWith("#")) return { type: "hashtag", value: normalizeHashtag(raw) };
      return { type: "text", value: raw };
    }

    function matchesGlobalSearch(wind) {
      const parsed = parseSearchTerm(globalSearchTerm);
      if (parsed.type === "none") return true;

      if (parsed.type === "user") {
        const author = normalizeId(wind.user);
        return author.includes(parsed.value);
      }

      if (parsed.type === "hashtag") {
        const tags = Array.isArray(wind.hashtags) ? wind.hashtags : extractHashtags(wind.text);
        return tags.includes(parsed.value);
      }

      const haystack = `${wind.user || ""} ${wind.text || ""}`.toLowerCase();
      return haystack.includes(parsed.value);
    }

    function setDarkMode(enabled) {
      darkModeEnabled = enabled;
      document.body.classList.toggle("light-mode", !enabled);
      darkModeBtn.textContent = enabled ? "Theme: Dark" : "Theme: Light";
      localStorage.setItem("kite-dark-mode", enabled ? "on" : "off");
    }

    function goToProfileByName(name) {
      const value = String(name || "").trim();
      if (!value) return;
      window.location.href = `server.html?view=profile&user=${encodeURIComponent(value)}`;
    }


    function clearCommentListeners() {
      commentUnsubscribers.forEach((unsubscribe) => unsubscribe());
      commentUnsubscribers.clear();
    }

    function renderNotificationItem(notification) {
      const row = document.createElement("article");
      row.className = "notification-item";

      const message = document.createElement("p");
      message.className = "notification-message";
      message.textContent = notification.message || "New activity";

      const meta = document.createElement("p");
      meta.className = "notification-meta";
      meta.textContent = window.formatTimestamp ? window.formatTimestamp(notification.time) : "now";

      row.appendChild(message);
      row.appendChild(meta);
      return row;
    }

    function attachNotificationsListener(user) {
      if (unsubscribeNotifications) {
        unsubscribeNotifications();
        unsubscribeNotifications = null;
      }

      unsubscribeNotifications = firebase.firestore()
        .collection("users")
        .doc(user.uid)
        .collection("notifications")
        .orderBy("time", "desc")
        .limit(20)
        .onSnapshot((snapshot) => {
          notificationList.innerHTML = "";
          if (snapshot.empty) {
            notificationEmpty.classList.remove("hidden");
            return;
          }

          notificationEmpty.classList.add("hidden");
          snapshot.forEach((doc) => {
            notificationList.appendChild(renderNotificationItem(doc.data()));
          });
        }, (error) => {
          notificationEmpty.classList.remove("hidden");
          notificationEmpty.textContent = `Notifications unavailable: ${error.message || "permission denied"}`;
        });
    }

    async function createNotification(recipientUid, message, windId) {
      if (!currentUser || !recipientUid || recipientUid === currentUser.uid) return;

      await firebase.firestore()
        .collection("users")
        .doc(recipientUid)
        .collection("notifications")
        .add({
          message,
          windId: windId || "",
          actorUid: currentUser.uid,
          actorLabel: currentUser.displayName || currentUser.email || "Someone",
          time: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    function setSidebarOpen(open) {
      feedPage.classList.toggle("sidebar-hidden", !open);
      sidebarToggleBtn.textContent = open ? "✕" : "☰";
    }

    function createLikeButton(likes, liked) {
      const button = document.createElement("button");
      button.className = "feed-like-btn";
      button.type = "button";
      button.classList.toggle("liked", liked);

      const icon = document.createElement("img");
      icon.className = "feed-like-icon";
      icon.src = liked ? LIKED_ICON : LIKE_ICON;
      icon.alt = liked ? "liked" : "like";

      const count = document.createElement("span");
      count.className = "feed-like-count";
      count.textContent = String(Number(likes) || 0);

      button.appendChild(icon);
      button.appendChild(count);

      return { button, icon, count };
    }

    function updateLikeVisual(buttonEl, iconEl, countEl, liked, likes) {
      buttonEl.classList.toggle("liked", liked);
      iconEl.src = liked ? LIKED_ICON : LIKE_ICON;
      iconEl.alt = liked ? "liked" : "like";
      countEl.textContent = String(Number(likes) || 0);
    }


    async function incrementLike(docRef) {
      await docRef.update({
        likes: firebase.firestore.FieldValue.increment(1)
      });
    }

    function canDeleteWind(wind, currentUserLabel) {
      if (!currentUser) return false;
      if (wind && wind.creatorUid && wind.creatorUid === currentUser.uid) return true;

      const ownerIds = [
        currentUser.uid,
        currentUser.email,
        currentUser.displayName,
        currentUserLabel
      ].map(normalizeId).filter(Boolean);

      return ownerIds.includes(normalizeId(wind && wind.user));
    }

    async function deleteWindWithComments(windRef) {
      const commentsSnap = await windRef.collection("comments").get();
      const batch = firebase.firestore().batch();
      commentsSnap.forEach((doc) => batch.delete(doc.ref));
      batch.delete(windRef);
      await batch.commit();
    }

    async function loadHomeAuthors(user) {
      const db = firebase.firestore();
      const allAuthors = new Set();
      const directAuthors = new Set();
      const secondHop = new Set();
      const selfIds = [user.uid, user.email, user.displayName].map(normalizeId).filter(Boolean);
      selfIds.forEach((id) => allAuthors.add(id));

      try {
        const meSnap = await db.collection("users").doc(user.uid).get();
        const me = meSnap.exists ? meSnap.data() : {};
        const myFollowing = Array.isArray(me.following) ? me.following : [];
        const followingIds = myFollowing.map(normalizeId).filter(Boolean);

        followingIds.forEach((id) => {
          directAuthors.add(id);
          allAuthors.add(id);
        });

        for (const followedId of followingIds) {
          try {
            const followedSnap = await db.collection("users").doc(followedId).get();
            if (!followedSnap.exists) continue;
            const followed = followedSnap.data();
            const secondHopFollowing = Array.isArray(followed.following) ? followed.following : [];
            secondHopFollowing.map(normalizeId).filter(Boolean).forEach((id) => {
              secondHop.add(id);
              allAuthors.add(id);
            });
          } catch (error) {
            console.warn("Could not load followed user:", followedId, error);
          }
        }
      } catch (error) {
        console.warn("Could not load following list:", error);
      }

      return { allAuthors, directAuthors, secondHop };
    }

    function matchesHomeFeed(wind) {
      return homeAuthors.has(normalizeId(wind.user));
    }

    function windTimestampMs(wind) {
      if (wind && wind.time && wind.time.toMillis) return wind.time.toMillis();
      if (wind && wind.time) return new Date(wind.time).getTime() || 0;
      return 0;
    }

    function relationshipBoost(wind, user) {
      const authorId = normalizeId(wind.user);
      const selfIds = [user.uid, user.email, user.displayName].map(normalizeId).filter(Boolean);
      if (selfIds.includes(authorId)) return 8;
      if (directFollowingAuthors.has(authorId)) return 5;
      if (secondHopAuthors.has(authorId)) return 2;
      return 0;
    }

    function computeFeedScore(entry, trendMap, user) {
      const wind = entry.data;
      const now = Date.now();
      const ageHours = Math.max(0, (now - windTimestampMs(wind)) / 3600000);
      const likes = Number(wind.likes) || 0;
      const hashtags = Array.isArray(wind.hashtags) ? wind.hashtags : extractHashtags(wind.text);
      const trendValue = hashtags.reduce((total, tag) => total + (trendMap.get(tag) || 0), 0);
      const relationship = relationshipBoost(wind, user);
      const textLength = String(wind.text || "").length;
      const textQualityBoost = textLength >= 30 && textLength <= MAX_WIND_LENGTH ? 1 : 0;
      const recency = 70 / (ageHours + 2);
      const engagement = likes * 2.4;
      const trendBoost = trendValue * 0.8;
      const freshnessBonus = ageHours < 1 ? 2 : 0;
      return recency + engagement + relationship + trendBoost + textQualityBoost + freshnessBonus;
    }

    function diversifyFeed(entries) {
      const pool = entries.slice();
      const authorCounts = new Map();
      const ordered = [];

      while (pool.length) {
        let bestIndex = 0;
        let bestValue = -Infinity;

        for (let i = 0; i < pool.length; i += 1) {
          const author = normalizeId(pool[i].data.user);
          const repeats = authorCounts.get(author) || 0;
          const adjusted = pool[i].score - repeats * 5;
          if (adjusted > bestValue) {
            bestValue = adjusted;
            bestIndex = i;
          }
        }

        const [picked] = pool.splice(bestIndex, 1);
        const author = normalizeId(picked.data.user);
        authorCounts.set(author, (authorCounts.get(author) || 0) + 1);
        ordered.push(picked);
      }

      return ordered;
    }

    function rankFeedEntries(entries, user) {
      const trendMap = new Map();
      entries.forEach((entry) => {
        const tags = Array.isArray(entry.data.hashtags) ? entry.data.hashtags : extractHashtags(entry.data.text);
        tags.forEach((tag) => {
          trendMap.set(tag, (trendMap.get(tag) || 0) + 1);
        });
      });

      const scored = entries.map((entry) => ({
        ...entry,
        score: computeFeedScore(entry, trendMap, user)
      }));

      scored.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return windTimestampMs(b.data) - windTimestampMs(a.data);
      });

      return diversifyFeed(scored);
    }

    function mixHomeFeed(rankedEntries) {
      const followed = rankedEntries.filter((entry) => matchesHomeFeed(entry.data));
      const discovery = rankedEntries.filter((entry) => !matchesHomeFeed(entry.data));
      const mixed = [];

      let i = 0;
      let j = 0;
      while (i < followed.length || j < discovery.length) {
        for (let step = 0; step < 4 && i < followed.length; step += 1) {
          mixed.push({ ...followed[i], source: "following" });
          i += 1;
        }

        if (j < discovery.length) {
          mixed.push({ ...discovery[j], source: "discover" });
          j += 1;
        }
      }

      return mixed;
    }

    function renderComment(commentDoc, currentUserLabel) {
      const comment = commentDoc.data();
      const row = document.createElement("div");
      row.className = "comment-row";

      const header = document.createElement("div");
      header.className = "comment-header";

      const authorWrap = document.createElement("div");
      authorWrap.className = "author-wrap";

      const avatar = document.createElement("img");
      avatar.className = "author-avatar";
      avatar.alt = "author avatar";
      avatar.src = window.resolveProfilePicture
        ? window.resolveProfilePicture(comment.profilePicture, comment.user)
        : (comment.profilePicture || avatarFromName(comment.user));

      const author = document.createElement("button");
      author.type = "button";
      author.className = "author-link";
      const commentAuthorLabel = normalizeId(comment.user) === normalizeId(currentUserLabel) ? "You" : (comment.user || "Anonymous");
      author.textContent = commentAuthorLabel;
      if (commentAuthorLabel !== "You") {
        author.addEventListener("click", () => goToProfileByName(comment.user));
      }

      authorWrap.appendChild(avatar);
      authorWrap.appendChild(author);

      const time = document.createElement("span");
      time.textContent = window.formatTimestamp ? window.formatTimestamp(comment.time) : "now";

      const text = document.createElement("p");
      text.textContent = comment.text || "";

      const commentKey = commentDoc.ref.path;
      const commentLike = createLikeButton(comment.likes, likedCommentIds.has(commentKey));

      header.appendChild(authorWrap);
      header.appendChild(time);
      row.appendChild(header);
      row.appendChild(text);
      row.appendChild(commentLike.button);

      commentLike.button.addEventListener("click", async () => {
        if (commentLike.button.classList.contains("pending")) return;
        if (likedCommentIds.has(commentKey)) {
          showNotice("You already liked this response.");
          return;
        }
        commentLike.button.classList.add("pending");
        try {
          await incrementLike(commentDoc.ref);
          likedCommentIds.add(commentKey);
          saveLikedState();
          updateLikeVisual(commentLike.button, commentLike.icon, commentLike.count, true, (Number(commentLike.count.textContent) || 0) + 1);
          await createNotification(
            comment.creatorUid,
            `${currentUser.displayName || currentUser.email || "Someone"} liked your response.`,
            comment.windId || ""
          );
        } catch (error) {
          commentLike.button.disabled = false;
          showNotice(`Unable to like response: ${error.message || "unknown error"}`);
        } finally {
          commentLike.button.classList.remove("pending");
        }
      });

      return row;
    }

    function renderWind(windDoc, currentUserLabel, sourceLabel = "") {
      const wind = typeof windDoc.data === "function" ? windDoc.data() : windDoc.data;
      const card = document.createElement("article");
      card.className = "wind-card";

      const header = document.createElement("div");
      header.className = "wind-meta";

      const authorWrap = document.createElement("div");
      authorWrap.className = "author-wrap";

      const avatar = document.createElement("img");
      avatar.className = "author-avatar";
      avatar.alt = "author avatar";
      avatar.src = window.resolveProfilePicture
        ? window.resolveProfilePicture(wind.profilePicture, wind.user)
        : (wind.profilePicture || avatarFromName(wind.user));

      const name = document.createElement("button");
      name.type = "button";
      name.className = "author-link";
      const windAuthorLabel = normalizeId(wind.user) === normalizeId(currentUserLabel) ? "You" : (wind.user || "Anonymous");
      name.textContent = windAuthorLabel;
      if (windAuthorLabel !== "You") {
        name.addEventListener("click", () => goToProfileByName(wind.user));
      }

      authorWrap.appendChild(avatar);
      authorWrap.appendChild(name);

      const time = document.createElement("span");
      time.textContent = window.formatTimestamp ? window.formatTimestamp(wind.time) : "now";

      const sourceBadge = document.createElement("span");
      sourceBadge.className = "wind-source-badge";
      sourceBadge.textContent = sourceLabel === "discover" ? "Discover pick" : "Following";
      if (!sourceLabel) {
        sourceBadge.classList.add("hidden");
      }

      const cloudEmoji = document.createElement("span");
      cloudEmoji.className = "wind-cloud-emoji";
      cloudEmoji.textContent = "☁️";
      cloudEmoji.setAttribute("aria-hidden", "true");

      const text = document.createElement("p");
      text.className = "wind-text";
      text.textContent = wind.text || "";

      const hashtags = Array.isArray(wind.hashtags) && wind.hashtags.length
        ? wind.hashtags
        : extractHashtags(wind.text);
      const hashtagsRow = document.createElement("div");
      hashtagsRow.className = "wind-hashtags";
      hashtags.forEach((tag) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "hashtag-chip";
        chip.textContent = `#${tag}`;
        chip.addEventListener("click", () => {
          setActiveView("explore");
          hashtagFilter = tag;
          globalSearchTerm = `#${tag}`;
          globalSearchInput.value = `#${tag}`;
          attachFeedListener(currentUser);
        });
        hashtagsRow.appendChild(chip);
      });

      const actionBar = document.createElement("div");
      actionBar.className = "wind-actions";

      const windLike = createLikeButton(wind.likes, likedWindIds.has(windDoc.id));
      const ownWind = canDeleteWind(wind, currentUserLabel);

      const hint = document.createElement("span");
      hint.className = "wind-comments-hint";
      hint.textContent = "click wind to open comments";

      actionBar.appendChild(windLike.button);

      if (ownWind) {
        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.className = "wind-delete-btn";
        deleteBtn.textContent = "Delete";

        deleteBtn.addEventListener("click", async () => {
          if (deleteBtn.classList.contains("pending")) return;
          if (!confirm("Delete this wind? This will also remove its comments.")) return;
          deleteBtn.classList.add("pending");
          try {
            await deleteWindWithComments(windRef);
            showNotice("Wind deleted.");
          } catch (error) {
            showNotice(`Unable to delete wind: ${error.message || "unknown error"}`);
          } finally {
            deleteBtn.classList.remove("pending");
          }
        });

        actionBar.appendChild(deleteBtn);
      }

      actionBar.appendChild(hint);

      const commentsWrap = document.createElement("div");
      commentsWrap.className = "comments-wrap hidden";

      const commentsList = document.createElement("div");
      commentsList.className = "comments-list";

      const composer = document.createElement("div");
      composer.className = "comment-compose";

      const commentInput = document.createElement("input");
      commentInput.type = "text";
      commentInput.maxLength = 120;
      commentInput.placeholder = "Write a response...";

      const postCommentBtn = document.createElement("button");
      postCommentBtn.className = "chat-send-btn";
      postCommentBtn.type = "button";
      postCommentBtn.textContent = "Post";

      composer.appendChild(commentInput);
      composer.appendChild(postCommentBtn);
      commentsWrap.appendChild(commentsList);
      commentsWrap.appendChild(composer);

      header.appendChild(authorWrap);
      header.appendChild(time);
      header.appendChild(sourceBadge);
      card.appendChild(header);
      card.appendChild(cloudEmoji);
      card.appendChild(text);
      if (hashtags.length) card.appendChild(hashtagsRow);
      card.appendChild(actionBar);
      card.appendChild(commentsWrap);

      const windRef = firebase.firestore().collection("winds").doc(windDoc.id);

      card.addEventListener("click", (event) => {
        if (event.target.closest("button") || event.target.closest("input")) return;
        commentsWrap.classList.toggle("hidden");
      });

      windLike.button.addEventListener("click", async () => {
        if (windLike.button.classList.contains("pending")) return;
        if (likedWindIds.has(windDoc.id)) {
          showNotice("You already liked this wind.");
          return;
        }
        windLike.button.classList.add("pending");
        try {
          await incrementLike(windRef);
          likedWindIds.add(windDoc.id);
          saveLikedState();
          updateLikeVisual(windLike.button, windLike.icon, windLike.count, true, (Number(windLike.count.textContent) || 0) + 1);
          await createNotification(
            wind.creatorUid,
            `${currentUser.displayName || currentUser.email || "Someone"} liked your wind.`,
            windDoc.id
          );
        } catch (error) {
          windLike.button.disabled = false;
          showNotice(`Unable to like wind: ${error.message || "unknown error"}`);
        } finally {
          windLike.button.classList.remove("pending");
        }
      });

      postCommentBtn.addEventListener("click", async () => {
        const responseText = commentInput.value.trim();
        if (!responseText) return;
        if (window.containsBlacklistedWords && window.containsBlacklistedWords(responseText).flagged) {
          const violation = await window.KITE_POLICY.registerPolicyViolation(currentUser, "blacklisted-comment", responseText);
          alert(violation.terminated ? "Policy violation detected. Your account was terminated." : "That response contains blocked words.");
          return;
        }

        try {
          await windRef.collection("comments").add({
            likes: 0,
            text: responseText,
            time: firebase.firestore.FieldValue.serverTimestamp(),
            user: currentUserLabel,
            profilePicture: currentUserProfilePicture,
            creatorUid: currentUser.uid,
            windId: windDoc.id
          });
          await createNotification(
            wind.creatorUid,
            `${currentUser.displayName || currentUser.email || "Someone"} replied to your wind.`,
            windDoc.id
          );
          commentInput.value = "";
        } catch (error) {
          showNotice(`Unable to post response: ${error.message || "unknown error"}`);
        }
      });

      if (!commentUnsubscribers.has(windDoc.id)) {
        const unsubscribeComments = windRef
          .collection("comments")
          .orderBy("time", "asc")
          .onSnapshot((snapshot) => {
            commentsList.innerHTML = "";
            snapshot.forEach((commentDoc) => {
              commentsList.appendChild(renderComment(commentDoc, currentUserLabel));
            });
          });

        commentUnsubscribers.set(windDoc.id, unsubscribeComments);
      }

      return card;
    }

    function updateCounter() {
      const count = chatInput.value.length;
      charCounter.textContent = `${count}/${MAX_WIND_LENGTH}`;
      charCounter.classList.toggle("limit-hit", count >= MAX_WIND_LENGTH);
    }

    function setActiveView(view) {
      activeFeedView = view;
      homeTabBtn.classList.toggle("active", view === "home");
      exploreTabBtn.classList.toggle("active", view === "explore");
      if (view === "home") {
        feedTitle.textContent = "Home";
        feedSubtitle.textContent = "Smart-ranked: people you follow first, with discovery mixed in.";
      } else {
        feedTitle.textContent = "Explore";
        feedSubtitle.textContent = hashtagFilter
          ? `Smart-ranked results for #${hashtagFilter}`
          : "Smart-ranked winds from everyone.";
      }
    }

    function attachFeedListener(user) {
      if (unsubscribeFeed) {
        unsubscribeFeed();
        unsubscribeFeed = null;
      }

      clearNotice();
      clearCommentListeners();

      const query = firebase.firestore().collection("winds").orderBy("time", "desc").limit(180);
      unsubscribeFeed = query.onSnapshot(
        (snapshot) => {
          chatContainer.innerHTML = "";
          const currentUserLabel = user.displayName || user.email || "Anonymous";

          const candidates = [];
          snapshot.forEach((doc) => {
            const wind = doc.data();
            if (activeFeedView === "explore" && !matchesHashtagFilter(wind)) return;
            if (!matchesGlobalSearch(wind)) return;
            candidates.push({ id: doc.id, data: wind });
          });

          const ranked = rankFeedEntries(candidates, user);
          let feedItems = ranked;

          if (activeFeedView === "home") {
            feedItems = mixHomeFeed(ranked);
          } else {
            feedItems = ranked.map((entry) => ({ ...entry, source: "discover" }));
          }

          const sliced = feedItems.slice(0, 120);
          sliced.forEach((item) => {
            chatContainer.appendChild(renderWind(item, currentUserLabel, item.source));
          });

          if (sliced.length === 0) {
            showNotice(activeFeedView === "home"
              ? "No posts in Home yet. Follow more people to tune your timeline."
              : (hashtagFilter ? `No posts for #${hashtagFilter}.` : "No posts yet. Be the first to post."));
          }
        },
        (error) => {
          showNotice(`Feed unavailable: ${error.message || "permission denied"}`);
          reportLoadStatus("Feed listener", error);
        }
      );
    }

    async function postWind(user, text) {
      await firebase.firestore().collection("winds").add({
        likes: 0,
        text,
        hashtags: extractHashtags(text),
        user: user.displayName || user.email || user.uid || "Anonymous",
        creatorUid: user.uid,
        profilePicture: currentUserProfilePicture,
        time: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      const policyResult = await window.KITE_POLICY.enforcePolicyForUser(user);
      if (!policyResult.allowed) {
        if (policyResult.reason === "policy-not-accepted") {
          const accepted = await window.KITE_POLICY.promptAndAcceptPolicyForUser(user, {
            title: "Policy Updated",
            subtitle: "The policy changed while you were in Kite. Accept the update to continue using the feed."
          });
          if (!accepted) {
            await firebase.auth().signOut();
            window.location.href = "login.html";
            return;
          }
        } else {
          alert(policyResult.message || "Policy check failed.");
          window.location.href = "login.html";
          return;
        }
      }
      window.KITE_POLICY.setSessionCookie(user.uid, 30);
      loadLikedState();
      try {
        const userDoc = await firebase.firestore().collection("users").doc(user.uid).get();
        const userData = userDoc.exists ? userDoc.data() : {};
        currentUserProfilePicture = userData.profilePicture || avatarFromName(user.displayName || user.email || "a");
        if (userData.language) window.KITE_I18N.setLanguage(userData.language);
        await window.KITE_I18N.applyLanguage(document);
      } catch (error) {
        currentUserProfilePicture = avatarFromName(user.displayName || user.email || "a");
      }

      const storedMode = localStorage.getItem("kite-dark-mode");
      setDarkMode(storedMode === "on");
      setSidebarOpen(true);
      const authorGraph = await loadHomeAuthors(user);
      homeAuthors = authorGraph.allAuthors;
      directFollowingAuthors = authorGraph.directAuthors;
      secondHopAuthors = authorGraph.secondHop;
      reportLoadStatus("Feed authors");
      setActiveView("home");
      attachFeedListener(user);
      attachNotificationsListener(user);

      sidebarCloseBtn.addEventListener("click", () => setSidebarOpen(false));
      sidebarToggleBtn.addEventListener("click", () => {
        const isOpen = !feedPage.classList.contains("sidebar-hidden");
        setSidebarOpen(!isOpen);
      });

      homeTabBtn.addEventListener("click", () => {
        hashtagFilter = "";
        setActiveView("home");
        attachFeedListener(user);
      });

      exploreTabBtn.addEventListener("click", () => {
        setActiveView("explore");
        attachFeedListener(user);
      });

      profileTabBtn.addEventListener("click", () => {
        window.location.href = "server.html?view=profile";
      });

      settingsTabBtn.addEventListener("click", () => {
        window.location.href = "settings.html";
      });

      globalSearchInput.addEventListener("input", () => {
        globalSearchTerm = globalSearchInput.value;
        attachFeedListener(user);
      });

      clearSearchBtn.addEventListener("click", () => {
        globalSearchInput.value = "";
        globalSearchTerm = "";
        attachFeedListener(user);
      });

      darkModeBtn.addEventListener("click", () => {
        setDarkMode(!darkModeEnabled);
      });

      sendBtn.addEventListener("click", async () => {
        const text = chatInput.value.trim();
        if (!text) return;
        if (text.length > MAX_WIND_LENGTH) {
          alert("Posts are limited to 280 characters.");
          return;
        }
        if (window.containsBlacklistedWords && window.containsBlacklistedWords(text).flagged) {
          const violation = await window.KITE_POLICY.registerPolicyViolation(currentUser, "blacklisted-wind", text);
          alert(violation.terminated ? "Policy violation detected. Your account was terminated." : "That post contains blocked words.");
          return;
        }

        try {
          await postWind(user, text);
          chatInput.value = "";
          updateCounter();
          clearNotice();
        } catch (error) {
          showNotice(`Unable to post: ${error.message || "unknown error"}`);
        }
      });

      chatInput.addEventListener("input", updateCounter);
      chatInput.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
          sendBtn.click();
        }
      });

      logoutBtn.addEventListener("click", async () => {
        window.KITE_POLICY.clearSessionCookie();
        await firebase.auth().signOut();
        window.location.href = "login.html";
      });

      updateCounter();
      updateFeedMetrics([]);
      reportLoadStatus("Feed page");
    });
    }
  </script>
</body>
</html>
