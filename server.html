<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kite — Wind Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="feed-page">
    <header class="feed-header">
      <h1>Kite</h1>
      <p>Wind Feed · old Twitter style</p>
      <button id="logoutBtn" class="secondary-btn">Logout</button>
    </header>

    <section class="wind-compose">
      <label for="chatInput">Drop a wind (max 60 chars)</label>
      <textarea id="chatInput" maxlength="60" placeholder="What's blowing through your head?"></textarea>
      <div class="wind-compose-footer">
        <span id="charCounter">0/60</span>
        <button id="sendBtn" class="chat-send-btn">Post Wind</button>
      </div>
      <p id="feedNotice" class="feed-notice hidden"></p>
    </section>

    <section id="chatContainer" class="wind-feed" aria-live="polite"></section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>

  <script>
    const chatContainer = document.getElementById("chatContainer");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const charCounter = document.getElementById("charCounter");
    const logoutBtn = document.getElementById("logoutBtn");
    const feedNotice = document.getElementById("feedNotice");

    const MAX_WIND_LENGTH = 60;
    const SERVER_ID = "demoServer";
    let activeSource = "winds";
    let unsubscribeFeed = null;

    function showNotice(text) {
      feedNotice.textContent = text;
      feedNotice.classList.remove("hidden");
    }

    function clearNotice() {
      feedNotice.textContent = "";
      feedNotice.classList.add("hidden");
    }

    function isPermissionDenied(error) {
      return error && (error.code === "permission-denied" || String(error.message || "").includes("Missing or insufficient permissions"));
    }

    function renderWind(wind, currentUid) {
      const card = document.createElement("article");
      card.className = "wind-card";

      const header = document.createElement("div");
      header.className = "wind-meta";

      const name = document.createElement("strong");
      const isYou = wind.uid === currentUid;
      name.textContent = isYou ? "You" : (wind.nickname || "Anonymous");

      const time = document.createElement("span");
      time.textContent = window.formatTimestamp ? window.formatTimestamp(wind.createdAt) : "now";

      const text = document.createElement("p");
      text.className = "wind-text";
      text.textContent = wind.text || "";

      header.appendChild(name);
      header.appendChild(time);
      card.appendChild(header);
      card.appendChild(text);

      return card;
    }

    function updateCounter() {
      const count = chatInput.value.length;
      charCounter.textContent = `${count}/${MAX_WIND_LENGTH}`;
      charCounter.classList.toggle("limit-hit", count >= MAX_WIND_LENGTH);
    }

    function attachFeedListener(user) {
      if (unsubscribeFeed) {
        unsubscribeFeed();
        unsubscribeFeed = null;
      }

      clearNotice();
      let query;

      if (activeSource === "winds") {
        query = firebase.firestore().collection("winds").orderBy("createdAt", "desc").limit(100);
      } else {
        query = firebase.firestore()
          .collection("messages")
          .where("serverId", "==", SERVER_ID)
          .orderBy("createdAt", "desc")
          .limit(100);
      }

      unsubscribeFeed = query.onSnapshot(
        (snapshot) => {
          chatContainer.innerHTML = "";
          snapshot.forEach((doc) => {
            chatContainer.appendChild(renderWind(doc.data(), user.uid));
          });
          if (snapshot.empty) {
            showNotice("No winds yet. Be the first to post.");
          }
        },
        (error) => {
          if (activeSource === "winds" && isPermissionDenied(error)) {
            activeSource = "messages";
            showNotice("Winds collection is locked by rules. Using fallback feed source.");
            attachFeedListener(user);
            return;
          }
          showNotice(`Feed unavailable: ${error.message || "permission denied"}`);
          console.error("Feed listener failed:", error);
        }
      );
    }

    async function postWind(user, text) {
      const payload = {
        text,
        uid: user.uid,
        nickname: user.displayName || "Anonymous",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        if (activeSource === "winds") {
          await firebase.firestore().collection("winds").add(payload);
        } else {
          await firebase.firestore().collection("messages").add({
            ...payload,
            serverId: SERVER_ID,
            type: "text"
          });
        }
      } catch (error) {
        if (activeSource === "winds" && isPermissionDenied(error)) {
          activeSource = "messages";
          showNotice("Write to winds is blocked. Posting to fallback feed source.");
          attachFeedListener(user);
          await firebase.firestore().collection("messages").add({
            ...payload,
            serverId: SERVER_ID,
            type: "text"
          });
          return;
        }
        throw error;
      }
    }

    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      attachFeedListener(user);

      sendBtn.addEventListener("click", async () => {
        const text = chatInput.value.trim();
        if (!text) return;

        if (text.length > MAX_WIND_LENGTH) {
          alert("Winds are limited to 60 characters.");
          return;
        }

        if (window.containsBannedWords && window.containsBannedWords(text)) {
          alert("That wind contains blocked words.");
          return;
        }

        try {
          await postWind(user, text);
          chatInput.value = "";
          updateCounter();
          clearNotice();
        } catch (error) {
          console.error("Post failed:", error);
          showNotice(`Unable to post wind: ${error.message || "unknown error"}`);
        }
      });

      chatInput.addEventListener("input", updateCounter);
      chatInput.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
          sendBtn.click();
        }
      });

      logoutBtn.addEventListener("click", async () => {
        await firebase.auth().signOut();
        window.location.href = "login.html";
      });

      updateCounter();
    });
  </script>
</body>
</html>
