<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kite — Wind Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="feed-page">
    <aside class="feed-sidebar">
      <div class="sidebar-brand">
        <img src="favicon.ico" alt="Kite logo" class="sidebar-logo" />
        <strong>Kite</strong>
      </div>

      <nav class="feed-nav" aria-label="Feed views">
        <button id="homeTabBtn" class="sidebar-btn active" type="button">🏠 Home</button>
        <button id="exploreTabBtn" class="sidebar-btn" type="button">🌎 Explore</button>
      </nav>

      <button id="logoutBtn" class="secondary-btn sidebar-logout" type="button">Logout</button>
    </aside>

    <section class="feed-main">
      <header class="feed-header">
        <h1 id="feedTitle">Home</h1>
        <p id="feedSubtitle">Winds from people you follow + who they follow.</p>
      </header>

      <section class="wind-compose">
        <label for="chatInput">Drop a wind (max 60 chars)</label>
        <textarea id="chatInput" maxlength="60" placeholder="What's blowing through your head?"></textarea>
        <div class="wind-compose-footer">
          <span id="charCounter">0/60</span>
          <button id="sendBtn" class="chat-send-btn" type="button">Post Wind</button>
        </div>
        <p id="feedNotice" class="feed-notice hidden"></p>
      </section>

      <section id="chatContainer" class="wind-feed" aria-live="polite"></section>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>

  <script>
    const chatContainer = document.getElementById("chatContainer");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const charCounter = document.getElementById("charCounter");
    const logoutBtn = document.getElementById("logoutBtn");
    const feedNotice = document.getElementById("feedNotice");
    const homeTabBtn = document.getElementById("homeTabBtn");
    const exploreTabBtn = document.getElementById("exploreTabBtn");
    const feedTitle = document.getElementById("feedTitle");
    const feedSubtitle = document.getElementById("feedSubtitle");

    const MAX_WIND_LENGTH = 60;
    let unsubscribeFeed = null;
    const commentUnsubscribers = new Map();
    let activeFeedView = "home";
    let homeAuthors = new Set();

    function showNotice(text) {
      feedNotice.textContent = text;
      feedNotice.classList.remove("hidden");
    }

    function clearNotice() {
      feedNotice.textContent = "";
      feedNotice.classList.add("hidden");
    }

    function clearCommentListeners() {
      commentUnsubscribers.forEach((unsubscribe) => unsubscribe());
      commentUnsubscribers.clear();
    }

    function normalizeIdentifier(value) {
      return String(value || "").trim().toLowerCase();
    }

    function collectFromMaybeObject(value, bag) {
      if (!value) return;
      if (typeof value === "string") {
        const id = normalizeIdentifier(value);
        if (id) bag.add(id);
        return;
      }
      if (typeof value === "object") {
        ["uid", "id", "user", "username", "email", "displayName"].forEach((key) => {
          const maybe = normalizeIdentifier(value[key]);
          if (maybe) bag.add(maybe);
        });
      }
    }

    function collectUserIdentifiers(userData, uid) {
      const ids = new Set();
      collectFromMaybeObject(userData, ids);
      [uid, userData?.user, userData?.username, userData?.displayName, userData?.email].forEach((v) => {
        const id = normalizeIdentifier(v);
        if (id) ids.add(id);
      });
      return ids;
    }

    function collectFollowingList(userData) {
      const followingList = [];
      ["following", "follows", "followingUsers", "followingIds"].forEach((field) => {
        const value = userData?.[field];
        if (Array.isArray(value)) {
          followingList.push(...value);
        }
      });
      return followingList;
    }

    async function loadHomeAuthors(user) {
      const db = firebase.firestore();
      const collected = new Set();
      const directFollowing = [];

      const addSelf = () => {
        [user.uid, user.email, user.displayName].forEach((v) => {
          const id = normalizeIdentifier(v);
          if (id) collected.add(id);
        });
      };

      addSelf();

      try {
        const userSnap = await db.collection("users").doc(user.uid).get();
        const userData = userSnap.exists ? userSnap.data() : {};
        collectUserIdentifiers(userData, user.uid).forEach((id) => collected.add(id));
        directFollowing.push(...collectFollowingList(userData));
      } catch (error) {
        console.warn("Unable to read your user profile for follows:", error);
      }

      const uniqueDirect = new Set();
      directFollowing.forEach((entry) => {
        collectFromMaybeObject(entry, uniqueDirect);
      });

      uniqueDirect.forEach((id) => collected.add(id));

      for (const followedId of uniqueDirect) {
        try {
          const followedSnap = await db.collection("users").doc(followedId).get();
          if (!followedSnap.exists) continue;

          const followedData = followedSnap.data();
          collectUserIdentifiers(followedData, followedId).forEach((id) => collected.add(id));

          collectFollowingList(followedData).forEach((entry) => {
            collectFromMaybeObject(entry, collected);
          });
        } catch (error) {
          console.warn(`Unable to read followed profile (${followedId}):`, error);
        }
      }

      return collected;
    }

    function matchesHomeFeed(wind) {
      const authorId = normalizeIdentifier(wind.user);
      return homeAuthors.has(authorId);
    }

    function renderComment(comment, currentUserLabel) {
      const row = document.createElement("div");
      row.className = "comment-row";

      const header = document.createElement("div");
      header.className = "comment-header";

      const author = document.createElement("strong");
      author.textContent = normalizeIdentifier(comment.user) === normalizeIdentifier(currentUserLabel) ? "You" : (comment.user || "Anonymous");

      const time = document.createElement("span");
      time.textContent = window.formatTimestamp ? window.formatTimestamp(comment.time) : "now";

      const text = document.createElement("p");
      text.textContent = comment.text || "";

      const likeBtn = document.createElement("button");
      likeBtn.className = "secondary-btn feed-action-btn";
      likeBtn.type = "button";
      likeBtn.textContent = `♥ ${Number(comment.likes) || 0}`;

      header.appendChild(author);
      header.appendChild(time);
      row.appendChild(header);
      row.appendChild(text);
      row.appendChild(likeBtn);

      return { row, likeBtn };
    }

    function renderWind(windDoc, currentUserLabel) {
      const wind = windDoc.data();
      const card = document.createElement("article");
      card.className = "wind-card";

      const header = document.createElement("div");
      header.className = "wind-meta";

      const name = document.createElement("strong");
      const isYou = normalizeIdentifier(wind.user) === normalizeIdentifier(currentUserLabel);
      name.textContent = isYou ? "You" : (wind.user || "Anonymous");

      const time = document.createElement("span");
      time.textContent = window.formatTimestamp ? window.formatTimestamp(wind.time) : "now";

      const text = document.createElement("p");
      text.className = "wind-text";
      text.textContent = wind.text || "";

      const actions = document.createElement("div");
      actions.className = "wind-actions";

      const likeBtn = document.createElement("button");
      likeBtn.className = "secondary-btn feed-action-btn";
      likeBtn.type = "button";
      likeBtn.textContent = `♥ ${Number(wind.likes) || 0}`;

      const commentsHint = document.createElement("span");
      commentsHint.className = "wind-comments-hint";
      commentsHint.textContent = "Click wind to open replies";

      actions.appendChild(likeBtn);
      actions.appendChild(commentsHint);

      const commentsWrap = document.createElement("div");
      commentsWrap.className = "comments-wrap hidden";

      const commentsList = document.createElement("div");
      commentsList.className = "comments-list";

      const composer = document.createElement("div");
      composer.className = "comment-compose";

      const commentInput = document.createElement("input");
      commentInput.type = "text";
      commentInput.maxLength = 120;
      commentInput.placeholder = "Write a response...";

      const postCommentBtn = document.createElement("button");
      postCommentBtn.className = "chat-send-btn";
      postCommentBtn.type = "button";
      postCommentBtn.textContent = "Post";

      composer.appendChild(commentInput);
      composer.appendChild(postCommentBtn);
      commentsWrap.appendChild(commentsList);
      commentsWrap.appendChild(composer);

      header.appendChild(name);
      header.appendChild(time);
      card.appendChild(header);
      card.appendChild(text);
      card.appendChild(actions);
      card.appendChild(commentsWrap);

      const windRef = firebase.firestore().collection("winds").doc(windDoc.id);

      card.addEventListener("click", (event) => {
        if (event.target.closest("button") || event.target.closest("input") || event.target.closest("textarea")) {
          return;
        }
        commentsWrap.classList.toggle("hidden");
      });

      likeBtn.addEventListener("click", async () => {
        try {
          await firebase.firestore().runTransaction(async (transaction) => {
            const snap = await transaction.get(windRef);
            const nextLikes = (Number(snap.data()?.likes) || 0) + 1;
            transaction.update(windRef, { likes: nextLikes });
          });
        } catch (error) {
          showNotice(`Unable to like wind: ${error.message || "unknown error"}`);
        }
      });

      postCommentBtn.addEventListener("click", async () => {
        const responseText = commentInput.value.trim();
        if (!responseText) return;
        if (window.containsBannedWords && window.containsBannedWords(responseText)) {
          alert("That response contains blocked words.");
          return;
        }

        try {
          await windRef.collection("comments").add({
            likes: 0,
            text: responseText,
            time: firebase.firestore.FieldValue.serverTimestamp(),
            user: currentUserLabel
          });
          commentInput.value = "";
        } catch (error) {
          showNotice(`Unable to post response: ${error.message || "unknown error"}`);
        }
      });

      if (!commentUnsubscribers.has(windDoc.id)) {
        const unsubscribeComments = windRef
          .collection("comments")
          .orderBy("time", "asc")
          .onSnapshot((snapshot) => {
            commentsList.innerHTML = "";
            snapshot.forEach((commentDoc) => {
              const rendered = renderComment(commentDoc.data(), currentUserLabel);
              commentsList.appendChild(rendered.row);

              rendered.likeBtn.addEventListener("click", async () => {
                try {
                  await firebase.firestore().runTransaction(async (transaction) => {
                    const snap = await transaction.get(commentDoc.ref);
                    const nextLikes = (Number(snap.data()?.likes) || 0) + 1;
                    transaction.update(commentDoc.ref, { likes: nextLikes });
                  });
                } catch (error) {
                  showNotice(`Unable to like response: ${error.message || "unknown error"}`);
                }
              });
            });
          });

        commentUnsubscribers.set(windDoc.id, unsubscribeComments);
      }

      const actions = document.createElement("div");
      actions.className = "wind-actions";

      const likeBtn = document.createElement("button");
      likeBtn.className = "secondary-btn feed-action-btn";
      likeBtn.textContent = `♥ ${Number(wind.likes) || 0}`;

      const commentToggleBtn = document.createElement("button");
      commentToggleBtn.className = "secondary-btn feed-action-btn";
      commentToggleBtn.textContent = "Reply";

      actions.appendChild(likeBtn);
      actions.appendChild(commentToggleBtn);
      card.appendChild(actions);

      const commentsWrap = document.createElement("div");
      commentsWrap.className = "comments-wrap hidden";

      const commentsList = document.createElement("div");
      commentsList.className = "comments-list";

      const composer = document.createElement("div");
      composer.className = "comment-compose";

      const commentInput = document.createElement("input");
      commentInput.type = "text";
      commentInput.maxLength = 120;
      commentInput.placeholder = "Write a response...";

      const postCommentBtn = document.createElement("button");
      postCommentBtn.className = "chat-send-btn";
      postCommentBtn.textContent = "Post";

      composer.appendChild(commentInput);
      composer.appendChild(postCommentBtn);
      commentsWrap.appendChild(commentsList);
      commentsWrap.appendChild(composer);
      card.appendChild(commentsWrap);

      const windRef = firebase.firestore().collection("winds").doc(windDoc.id);

      likeBtn.addEventListener("click", async () => {
        try {
          await firebase.firestore().runTransaction(async (transaction) => {
            const snap = await transaction.get(windRef);
            const nextLikes = (Number(snap.data().likes) || 0) + 1;
            transaction.update(windRef, { likes: nextLikes });
          });
        } catch (error) {
          showNotice(`Unable to like wind: ${error.message || "unknown error"}`);
        }
      });

      commentToggleBtn.addEventListener("click", () => {
        commentsWrap.classList.toggle("hidden");
      });

      postCommentBtn.addEventListener("click", async () => {
        const text = commentInput.value.trim();
        if (!text) return;
        if (window.containsBannedWords && window.containsBannedWords(text)) {
          alert("That response contains blocked words.");
          return;
        }

        try {
          await windRef.collection("comments").add({
            likes: 0,
            text,
            time: firebase.firestore.FieldValue.serverTimestamp(),
            user: currentUserLabel
          });
          commentInput.value = "";
        } catch (error) {
          showNotice(`Unable to post response: ${error.message || "unknown error"}`);
        }
      });

      if (!commentUnsubscribers.has(windDoc.id)) {
        const unsubscribeComments = windRef
          .collection("comments")
          .orderBy("time", "asc")
          .onSnapshot((snapshot) => {
            commentsList.innerHTML = "";
            snapshot.forEach((commentDoc) => {
              const rendered = renderComment(commentDoc.data(), currentUserLabel);
              commentsList.appendChild(rendered.row);

              rendered.likeBtn.addEventListener("click", async () => {
                try {
                  await firebase.firestore().runTransaction(async (transaction) => {
                    const snap = await transaction.get(commentDoc.ref);
                    const nextLikes = (Number(snap.data().likes) || 0) + 1;
                    transaction.update(commentDoc.ref, { likes: nextLikes });
                  });
                } catch (error) {
                  showNotice(`Unable to like response: ${error.message || "unknown error"}`);
                }
              });
            });
          });

        commentUnsubscribers.set(windDoc.id, unsubscribeComments);
      }

      return card;
    }

    function updateCounter() {
      const count = chatInput.value.length;
      charCounter.textContent = `${count}/${MAX_WIND_LENGTH}`;
      charCounter.classList.toggle("limit-hit", count >= MAX_WIND_LENGTH);
    }

    function setActiveView(view) {
      activeFeedView = view;
      homeTabBtn.classList.toggle("active", view === "home");
      exploreTabBtn.classList.toggle("active", view === "explore");

      if (view === "home") {
        feedTitle.textContent = "Home";
        feedSubtitle.textContent = "Winds from people you follow + who they follow.";
      } else {
        feedTitle.textContent = "Explore";
        feedSubtitle.textContent = "All public winds.";
      }
    }

    function attachFeedListener(user) {
      if (unsubscribeFeed) {
        unsubscribeFeed();
        unsubscribeFeed = null;
      }

      clearNotice();
      clearCommentListeners();
      const query = firebase.firestore().collection("winds").orderBy("likes", "desc").limit(150);

      unsubscribeFeed = query.onSnapshot(
        (snapshot) => {
          chatContainer.innerHTML = "";
          const currentUserLabel = user.displayName || user.email || "Anonymous";
          let renderedCount = 0;

          snapshot.forEach((doc) => {
            const wind = doc.data();
            if (activeFeedView === "home" && !matchesHomeFeed(wind)) {
              return;
            }
            chatContainer.appendChild(renderWind(doc, currentUserLabel));
            renderedCount += 1;
          });

          if (renderedCount === 0) {
            showNotice(activeFeedView === "home"
              ? "No winds in Home yet. Follow people to populate this feed."
              : "No winds yet. Be the first to post.");
          }
        },
        (error) => {
          showNotice(`Feed unavailable: ${error.message || "permission denied"}`);
          console.error("Feed listener failed:", error);
        }
      );
    }

    async function postWind(user, text) {
      await firebase.firestore().collection("winds").add({
        likes: 0,
        text,
        user: user.displayName || user.email || user.uid || "Anonymous",
        time: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      homeAuthors = await loadHomeAuthors(user);
      setActiveView("home");
      attachFeedListener(user);

      homeTabBtn.addEventListener("click", () => {
        setActiveView("home");
        attachFeedListener(user);
      });

      exploreTabBtn.addEventListener("click", () => {
        setActiveView("explore");
        attachFeedListener(user);
      });

      sendBtn.addEventListener("click", async () => {
        const text = chatInput.value.trim();
        if (!text) return;

        if (text.length > MAX_WIND_LENGTH) {
          alert("Winds are limited to 60 characters.");
          return;
        }

        if (window.containsBannedWords && window.containsBannedWords(text)) {
          alert("That wind contains blocked words.");
          return;
        }

        try {
          await postWind(user, text);
          chatInput.value = "";
          updateCounter();
          clearNotice();
        } catch (error) {
          console.error("Post failed:", error);
          showNotice(`Unable to post wind: ${error.message || "unknown error"}`);
        }
      });

      chatInput.addEventListener("input", updateCounter);
      chatInput.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
          sendBtn.click();
        }
      });

      logoutBtn.addEventListener("click", async () => {
        await firebase.auth().signOut();
        window.location.href = "login.html";
      });

      updateCounter();
    });
  </script>
</body>
</html>
