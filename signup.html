<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kite — Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Kite</h1>
      <h2 data-i18n="signup.title">Create Account</h2>

      <form id="signupForm" novalidate>
        <div id="signupStepOne">
        <input type="text" id="nickname" placeholder="Nickname" data-i18n-placeholder="signup.nickname" required />
        <input type="email" id="email" placeholder="Email" data-i18n-placeholder="signup.email" autocomplete="email" required />

        <div class="password-field">
          <input type="password" id="password" placeholder="Password" data-i18n-placeholder="signup.password" autocomplete="new-password" required />
          <span class="password-toggle" id="togglePassword">Show</span>
        </div>

        <div class="password-field">
          <input type="password" id="confirmPassword" placeholder="Confirm Password" data-i18n-placeholder="signup.confirm" autocomplete="new-password" required />
          <span class="password-toggle" id="toggleConfirmPassword">Show</span>
        </div>

        <!-- SAME LABEL AS BEFORE -->

        <div class="profile-edit-row">
          <label for="defaultLanguage" data-i18n="signup.language">Default language</label>
          <select id="defaultLanguage">
            <option value="en" data-i18n="signup.english">English</option>
            <option value="sv" data-i18n="signup.swedish">Swedish</option>
          </select>
        </div>
        <button type="submit" class="primary-btn" id="createAccountBtn" data-i18n="signup.submit">Sign Up</button>
        </div>

        <div id="signupStepTwo" class="hidden">
          <input type="text" id="favoriteFood" placeholder="What's your favorite food?" data-i18n-placeholder="signup.food" required />
          <input type="text" id="favoriteSport" placeholder="What's your favorite sport?" data-i18n-placeholder="signup.sport" required />
          <button type="button" class="primary-btn" id="finishProfileBtn" data-i18n="signup.finish">Finish Profile</button>
        </div>
      </form>

      <p class="switch">
        <a href="login.html" data-i18n="signup.login">Already have an account? Login</a>
      </p>

      <p id="errorMsg" class="error-text"></p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script src="blacklisted.js"></script>
  <script src="policy.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>

  <script>
    const reportLoadStatus = window.reportLoadStatus || ((name, error) => {
      if (error) {
        console.error(`error "${name}" didnt load ❌`, error);
      } else {
        console.info(`"${name}" succesfully loaded ✔`);
      }
    });

    const form = document.getElementById("signupForm");
    const errorMsg = document.getElementById("errorMsg");

    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirmPassword");
    const togglePassword = document.getElementById("togglePassword");
    const toggleConfirm = document.getElementById("toggleConfirmPassword");
    const stepOne = document.getElementById("signupStepOne");
    const stepTwo = document.getElementById("signupStepTwo");
    const finishProfileBtn = document.getElementById("finishProfileBtn");

    window.KITE_POLICY.requireLocalPolicyAcceptance({
      title: "Sign-up Policy Gate",
      subtitle: "You must accept Kite policy before creating an account."
    });

    const defaultLanguage = document.getElementById("defaultLanguage");

    let createdUser = null;
    let createdNickname = "";
    let createdEmail = "";

    window.KITE_I18N.applyLanguage(document);
    defaultLanguage.value = window.KITE_I18N.getLanguage();

    togglePassword.onclick = () => {
      const hidden = passwordInput.type === "password";
      passwordInput.type = hidden ? "text" : "password";
      togglePassword.textContent = hidden ? "Hide" : "Show";
    };

    toggleConfirm.onclick = () => {
      const hidden = confirmInput.type === "password";
      confirmInput.type = hidden ? "text" : "password";
      toggleConfirm.textContent = hidden ? "Hide" : "Show";
    };

    reportLoadStatus("Signup controls");

    form.onsubmit = async (e) => {
      e.preventDefault();
      errorMsg.textContent = "";

      const nickname = document.getElementById("nickname").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;
      const preferredLanguage = defaultLanguage.value;

      if (password !== confirmPassword) {
        errorMsg.textContent = "Passwords do not match.";
        return;
      }
      if (window.containsBlacklistedWords && window.containsBlacklistedWords(nickname).flagged) {
        errorMsg.textContent = "Nickname violates policy.";
        return;
      }

      try {
        await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        await window.KITE_I18N.setAndApply(preferredLanguage);
        const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
        createdUser = cred.user;
        createdNickname = nickname;
        createdEmail = email;

        await createdUser.updateProfile({ displayName: nickname });
        await window.KITE_POLICY.registerPolicyAcceptance(createdUser.uid, email);
        reportLoadStatus("Signup account creation");

        stepOne.classList.add("hidden");
        stepTwo.classList.remove("hidden");
      } catch (err) {
        reportLoadStatus("Signup account creation", err);
        errorMsg.textContent = err.message;
      }
    };

    finishProfileBtn.onclick = async () => {
      if (!createdUser) return;
      errorMsg.textContent = "";

      const favoriteFood = document.getElementById("favoriteFood").value.trim();
      const favoriteSport = document.getElementById("favoriteSport").value.trim();

      if (!favoriteFood || !favoriteSport) {
        errorMsg.textContent = "Please answer both profile questions.";
        return;
      }
      if (window.containsBlacklistedWords && (window.containsBlacklistedWords(favoriteFood).flagged || window.containsBlacklistedWords(favoriteSport).flagged)) {
        errorMsg.textContent = "Profile answers violate policy.";
        return;
      }

      const description = `Favorite food: ${favoriteFood} · Favorite sport: ${favoriteSport}`;

      try {
        await firebase.firestore().collection("users").doc(createdUser.uid).set({
          nickname: createdNickname,
          email: createdEmail,
          favoriteFood,
          favoriteSport,
          onboardingComplete: true,
          description,
          profilePicture: window.avatarProfilePictureForName(createdNickname),
          language: defaultLanguage.value
        }, { merge: true });

        window.KITE_I18N.setLanguage(defaultLanguage.value);
        window.KITE_POLICY.setSessionCookie(createdUser.uid, 30);
        reportLoadStatus("Signup profile setup");
        window.location.href = "profile.html";
      } catch (err) {
        reportLoadStatus("Signup profile setup", err);
        errorMsg.textContent = err.message;
      }
    };
  </script>
</body>
</html>
