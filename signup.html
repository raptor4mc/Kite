<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kite — Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Kite</h1>
      <h2>Create Account</h2>

      <form id="signupForm" novalidate>
        <div id="signupStepOne">
        <input type="text" id="nickname" placeholder="Nickname" required />
        <input type="email" id="email" placeholder="Email" autocomplete="email" required />

        <div class="password-field">
          <input type="password" id="password" placeholder="Password" autocomplete="new-password" required />
          <span class="password-toggle" id="togglePassword">Show</span>
        </div>

        <div class="password-field">
          <input type="password" id="confirmPassword" placeholder="Confirm Password" autocomplete="new-password" required />
          <span class="password-toggle" id="toggleConfirmPassword">Show</span>
        </div>

        <!-- SAME LABEL AS BEFORE -->
        <button type="submit" class="primary-btn" id="createAccountBtn">Sign Up</button>
        </div>

        <div id="signupStepTwo" class="hidden">
          <input type="text" id="favoriteFood" placeholder="What's your favorite food?" required />
          <input type="text" id="favoriteSport" placeholder="What's your favorite sport?" required />
          <button type="button" class="primary-btn" id="finishProfileBtn">Finish Profile</button>
        </div>
      </form>

      <p class="switch">
        Already have an account? <a href="login.html">Login</a>
      </p>

      <p id="errorMsg" class="error-text"></p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script src="app.js"></script>

  <script>
    const reportLoadStatus = window.reportLoadStatus || ((name, error) => {
      if (error) {
        console.error(`error "${name}" didnt load ❌`, error);
      } else {
        console.info(`"${name}" succesfully loaded ✔`);
      }
    });

    const form = document.getElementById("signupForm");
    const errorMsg = document.getElementById("errorMsg");

    const passwordInput = document.getElementById("password");
    const confirmInput = document.getElementById("confirmPassword");
    const togglePassword = document.getElementById("togglePassword");
    const toggleConfirm = document.getElementById("toggleConfirmPassword");
    const stepOne = document.getElementById("signupStepOne");
    const stepTwo = document.getElementById("signupStepTwo");
    const finishProfileBtn = document.getElementById("finishProfileBtn");

    let createdUser = null;
    let createdNickname = "";
    let createdEmail = "";

    togglePassword.onclick = () => {
      const hidden = passwordInput.type === "password";
      passwordInput.type = hidden ? "text" : "password";
      togglePassword.textContent = hidden ? "Hide" : "Show";
    };

    toggleConfirm.onclick = () => {
      const hidden = confirmInput.type === "password";
      confirmInput.type = hidden ? "text" : "password";
      toggleConfirm.textContent = hidden ? "Hide" : "Show";
    };

    reportLoadStatus("Signup controls");

    form.onsubmit = async (e) => {
      e.preventDefault();
      errorMsg.textContent = "";

      const nickname = document.getElementById("nickname").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;

      if (password !== confirmPassword) {
        errorMsg.textContent = "Passwords do not match.";
        return;
      }

      try {
        const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
        createdUser = cred.user;
        createdNickname = nickname;
        createdEmail = email;

        await createdUser.updateProfile({ displayName: nickname });
        reportLoadStatus("Signup account creation");

        stepOne.classList.add("hidden");
        stepTwo.classList.remove("hidden");
      } catch (err) {
        reportLoadStatus("Signup account creation", err);
        errorMsg.textContent = err.message;
      }
    };

    finishProfileBtn.onclick = async () => {
      if (!createdUser) return;
      errorMsg.textContent = "";

      const favoriteFood = document.getElementById("favoriteFood").value.trim();
      const favoriteSport = document.getElementById("favoriteSport").value.trim();

      if (!favoriteFood || !favoriteSport) {
        errorMsg.textContent = "Please answer both profile questions.";
        return;
      }

      const firstLetter = (createdNickname || "a").trim().charAt(0).toLowerCase() || "a";
      const description = `Favorite food: ${favoriteFood} · Favorite sport: ${favoriteSport}`;

      try {
        await firebase.firestore().collection("users").doc(createdUser.uid).set({
          nickname: createdNickname,
          email: createdEmail,
          favoriteFood,
          favoriteSport,
          onboardingComplete: true,
          description,
          profilePicture: `images/pfp/${firstLetter}.png`
        });

        reportLoadStatus("Signup profile setup");
        window.location.href = "profile.html";
      } catch (err) {
        reportLoadStatus("Signup profile setup", err);
        errorMsg.textContent = err.message;
      }
    };
  </script>
</body>
</html>
