<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-body">
  <main class="landing-shell twitter-landing">
    <section class="landing-card" aria-label="Welcome to Kite">
      <p class="landing-eyebrow">Kite</p>
      <h1 data-i18n="index.welcome">See what’s happening right now</h1>
      <p class="landing-subtitle">
        Join the conversation, follow people you care about, and post short updates in a cleaner timeline.
      </p>

      <div class="landing-actions">
        <button class="primary-btn" onclick="location.href='login.html'" data-i18n="index.login">Sign in</button>
        <button class="secondary-btn" onclick="location.href='signup.html'" data-i18n="index.create">Create account</button>
      </div>

      <ul class="landing-highlights" aria-label="Platform highlights">
        <li>Fast timeline with likes, comments, and profile discovery</li>
        <li>Simple sign in + clean onboarding flow</li>
        <li>Responsive layout for desktop and mobile</li>
      </ul>
    </section>
  </main>

  <script src="policy.js"></script>
  <script src="i18n.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", async () => {
      if (window.KITE_I18N) await window.KITE_I18N.applyLanguage(document);
      if (window.KITE_POLICY) {
        await window.KITE_POLICY.requireLocalPolicyAcceptance({
          title: "Welcome to Kite",
          subtitle: "You must accept Kite policy before entering login or signup."
        });
      }
    });
  </script>
</body>
</html>
