<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kite — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Kite</h1>
      <h2 data-i18n="login.title">Sign in to your account</h2>
      <p class="profile-small-text" data-i18n="login.subtitle">Welcome back. Log in and continue your timeline.</p>

      <form id="loginForm" autocomplete="on">
        <input
          type="email"
          id="email"
          placeholder="Email" data-i18n-placeholder="login.email"
          autocomplete="email"
          required
        />

        <div class="password-field">
          <input
            type="password"
            id="password"
            placeholder="Password" data-i18n-placeholder="login.password"
            autocomplete="current-password"
            required
          />
          <span class="password-toggle" id="togglePassword">Show</span>
        </div>
        <button type="submit" class="primary-btn" data-i18n="login.submit">Sign in</button>
      </form>

      <p class="switch">
        Don’t have an account? <a href="signup.html">Sign up</a>
      </p>

      <p id="errorMsg" class="error-text"></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script src="blacklisted.js"></script>
  <script src="policy.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>

  <script>
    const reportLoadStatus = window.reportLoadStatus || ((name, error) => {
      if (error) {
        console.error(`error "${name}" didnt load ❌`, error);
      } else {
        console.info(`"${name}" succesfully loaded ✔`);
      }
    });

    const form = document.getElementById("loginForm");
    const passwordInput = document.getElementById("password");
    const toggle = document.getElementById("togglePassword");
    const errorMsg = document.getElementById("errorMsg");

    window.KITE_I18N.applyLanguage(document);

    window.KITE_POLICY.requireLocalPolicyAcceptance({
      title: "Login Policy Gate",
      subtitle: "Policy acceptance is required before logging in."
    });

    try {
      toggle.onclick = () => {
        const hidden = passwordInput.type === "password";
        passwordInput.type = hidden ? "text" : "password";
        toggle.textContent = hidden ? "Hide" : "Show";
      };
      reportLoadStatus("Login controls");
    } catch (err) {
      reportLoadStatus("Login controls", err);
    }

    function getFriendlyError(err) {
      const code = err && err.code ? err.code : "";
      if (code.includes("wrong-password") || code.includes("invalid-credential")) return "Incorrect email or password.";
      if (code.includes("user-not-found")) return "Account not found. Try signing up first.";
      if (code.includes("too-many-requests")) return "Too many attempts. Wait a minute and try again.";
      return err.message || "Could not log in right now.";
    }


    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) return;
      try {
        const policyResult = await window.KITE_POLICY.enforcePolicyForUser(user);
        if (!policyResult.allowed) {
          if (policyResult.reason === "policy-not-accepted") {
            const accepted = await window.KITE_POLICY.promptAndAcceptPolicyForUser(user, {
              title: "Policy Updated",
              subtitle: "Accept the updated policy to continue to your account."
            });
            if (!accepted) {
              await firebase.auth().signOut();
              return;
            }
          } else {
            errorMsg.textContent = policyResult.message || "Policy check failed.";
            return;
          }
        }
        const userSnap = await firebase.firestore().collection("users").doc(user.uid).get();
        const userData = userSnap.exists ? userSnap.data() : {};
        if (userData.language) await window.KITE_I18N.setAndApply(userData.language);
        window.KITE_POLICY.setSessionCookie(user.uid, 30);
        window.location.href = "server.html?view=profile";
      } catch (err) {
        errorMsg.textContent = "Could not validate account policy.";
      }
    });

    form.onsubmit = async (e) => {
      e.preventDefault();
      errorMsg.textContent = "";

      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value;
      try {
        await firebase.auth().setPersistence(
          firebase.auth.Auth.Persistence.LOCAL
        );

        await firebase.auth().signInWithEmailAndPassword(email, password);
        reportLoadStatus("Login authentication");
      } catch (err) {
        reportLoadStatus("Login authentication", err);
        errorMsg.textContent = getFriendlyError(err);
      }
    };
  </script>
</body>
</html>
