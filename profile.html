<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kite - Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="profile-card profile-card-updated">
      <h1>Kite</h1>
      <h2>Your Profile</h2>

      <div class="profile-avatar-wrap">
        <img id="profileAvatar" class="profile-avatar" alt="Profile picture" src="images/pfp/a.png" />
      </div>

      <div class="profile-row"><span>Nickname</span><strong id="nicknameValue">-</strong></div>
      <div class="profile-row"><span>Email</span><strong id="emailValue">-</strong></div>
      <div class="profile-row"><span>Description</span><strong id="descriptionValue">-</strong></div>

      <div class="profile-actions">
        <button id="chatBtn" class="primary-btn" type="button">Open Wind Feed</button>
        <button id="logoutBtn" class="secondary-btn danger" type="button">Logout</button>
      </div>

      <p id="profileMsg" class="switch hidden"></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>

  <script>
    const nicknameValue = document.getElementById("nicknameValue");
    const emailValue = document.getElementById("emailValue");
    const descriptionValue = document.getElementById("descriptionValue");
    const profileAvatar = document.getElementById("profileAvatar");
    const chatBtn = document.getElementById("chatBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const profileMsg = document.getElementById("profileMsg");

    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const fallbackNickname = user.displayName || "Anonymous";
      const fallbackLetter = fallbackNickname.trim().charAt(0).toLowerCase() || "a";

      nicknameValue.textContent = fallbackNickname;
      emailValue.textContent = user.email || "-";
      profileAvatar.src = `images/pfp/${fallbackLetter}.png`;

      try {
        const snap = await firebase.firestore().collection("users").doc(user.uid).get();
        if (snap.exists) {
          const data = snap.data();
          const nickname = data.nickname || fallbackNickname;
          const letter = nickname.trim().charAt(0).toLowerCase() || "a";

          nicknameValue.textContent = nickname;
          emailValue.textContent = data.email || user.email || "-";
          descriptionValue.textContent = data.description || "No description yet.";
          profileAvatar.src = data.profilePicture || `images/pfp/${letter}.png`;
        }
      } catch (error) {
        console.error(error);
        profileMsg.textContent = "Could not load profile details.";
        profileMsg.classList.remove("hidden");
      }

      chatBtn.onclick = () => {
        window.location.href = "server.html";
      };

      logoutBtn.onclick = async () => {
        await firebase.auth().signOut();
        window.location.href = "login.html";
      };
    });
  </script>
</body>
</html>
