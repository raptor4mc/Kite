<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kite - Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="profile-card profile-card-updated">
      <h1>Kite</h1>
      <h2>Your Profile</h2>

      <div class="profile-avatar-wrap">
        <img id="profileAvatar" class="profile-avatar" alt="Profile picture" src="images/pfp/a.png" />
      </div>

      <div class="profile-row"><span>Nickname</span><strong id="nicknameValue">-</strong></div>
      <div class="profile-row"><span>Email</span><strong id="emailValue">-</strong></div>
      <div class="profile-row"><span>Description</span><strong id="descriptionValue">-</strong></div>

      <div class="profile-actions">
        <button id="chatBtn" class="primary-btn" type="button">Open Wind Feed</button>
        <button id="logoutBtn" class="secondary-btn danger" type="button">Logout</button>
      </div>

      <p id="profileMsg" class="switch hidden"></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>

  <script src="profile.js"></script>
</body>
</html>
